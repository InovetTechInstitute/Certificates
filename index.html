<script type="module">
  // 1. Import Firebase and Firestore functions
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // 2. Your Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyBNy0MpNvXudKXAewiz-UE6lzpmpsBf-lA",
    authDomain: "certificate-verification-c3384.firebaseapp.com",
    projectId: "certificate-verification-c3384",
    storageBucket: "certificate-verification-c3384.firebasestorage.app",
    messagingSenderId: "296793319215",
    appId: "1:296793319215:web:c4b5d9f2f4e91fe89ea3da"
  };

  // 3. Initialize Firebase and Firestore
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 4. The Verification Function
  async function verifyCert() {
    const input = document.getElementById("certID").value.trim();
    const resultDiv = document.getElementById("result");

    if (!input) {
      resultDiv.innerHTML = "<p class='error'>Please enter a Certificate ID.</p>";
      return;
    }

    resultDiv.innerHTML = "Searching...";

    try {
      // Look for the document in the "certificates" collection using the ID entered
      const docRef = doc(db, "certificates", input);
      const docSnap = await getDoc(docRef);

      if (docSnap.exists()) {
        const cert = docSnap.data();
        resultDiv.innerHTML = `
            <b>Student Name:</b> ${cert.name}<br>
            <b>Program:</b> ${cert.program}<br>
            <b>Batch:</b> ${cert.batch}<br>
            <b>Issue Date:</b> ${cert.date}<br>
            <b>Status:</b> <span class="status-valid">${cert.status || 'VALID'} ✅</span>
        `;
      } else {
        resultDiv.innerHTML = "<p class='error'>❌ Certificate ID not found. Please check and try again.</p>";
      }
    } catch (error) {
      console.error("Error fetching document:", error);
      resultDiv.innerHTML = "<p class='error'>Error connecting to database.</p>";
    }
  }

  // Expose function to the button (needed when using type="module")
  window.verifyCert = verifyCert;
</script>
