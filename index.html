<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inovettech Certificate Verification</title>

    <style>
        /* Modern Reset & Background */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        /* Main Container Card */
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        /* Logo Styling */
        .logo {
            max-width: 150px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #1e88e5;
        }

        h2 {
            font-size: 16px;
            font-weight: 400;
            color: #666;
            margin-bottom: 30px;
        }

        /* Input & Button Group */
        .search-box {
            margin-bottom: 25px;
        }

        input {
            padding: 12px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            border: 2px solid #ddd;
            border-radius: 6px;
            margin-bottom: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #1e88e5;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: #1e88e5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover {
            background: #1565c0;
        }

        /* Result Area */
        #result {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: left;
            line-height: 1.6;
        }

        .status-valid {
            color: #2e7d32;
            font-weight: bold;
            background: #e8f5e9;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .error {
            color: #d32f2f;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">
    <img src="InovetTech.png" alt="Inovettech Logo" class="logo">

    <h1>INOVETTECH INSTITUTE</h1>
    <h2>Certificate Verification Portal</h2>

    <div class="search-box">
        <input type="text" id="certID" placeholder="Enter Certificate ID (e.g. ITA-FSAP...)">
        <button onclick="verifyCert()">Verify Certificate</button>
    </div>

    <div id="result"></div>
</div>

    <script>
        import "firebase/compat/firestore"

const db = firebase.firestore();
db.collection("cities").where("capital", "==", true)


    // 1. Firebase Configuration (Replace with your own from Firebase Console)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_MESSAGING_ID",
  appId: "YOUR_APP_ID"
};

// 2. Initialize Firebase
const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 3. The Complete Verify Function
async function verifyCert() {
    const certId = document.getElementById('certId').value.trim();
    const resultDiv = document.getElementById('result');

    // Show a loading message
    resultDiv.innerHTML = "Verifying...";

    if (!certId) {
        resultDiv.innerHTML = "<p style='color:red;'>Please enter a Certificate ID.</p>";
        return;
    }

    try {
        // Look for the certificate in your 'certificates' collection
        const q = db.collection("certificates").where("certificateId", "==", certId);
        const querySnapshot = await q.get();

        if (!querySnapshot.empty) {
            // If found, display the details
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                resultDiv.innerHTML = `
                    <div style="border: 2px solid green; padding: 15px; margin-top: 10px;">
                        <h3 style="color: green;">✓ Verified Certificate</h3>
                        <p><strong>Student Name:</strong> ${data.studentName}</p>
                        <p><strong>Course:</strong> ${data.courseName}</p>
                        <p><strong>Issue Date:</strong> ${data.issueDate}</p>
                    </div>
                `;
            });
        } else {
            // If not found
            resultDiv.innerHTML = "<p style='color:red;'>✘ Invalid Certificate ID. Please check and try again.</p>";
        }
    } catch (error) {
        console.error("Error verifying certificate: ", error);
        resultDiv.innerHTML = "<p style='color:red;'>Error connecting to database. Please try again later.</p>";
    }
}

</script>

</body>
</html>
